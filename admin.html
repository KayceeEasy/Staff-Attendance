<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Access</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="card admin-card">
    <h1>Admin Access</h1>
    <p class="admin-intro">Use admin credentials to manage device ownership and local sync state.</p>
    <input id="admin-username" type="text" placeholder="Username" />
    <input id="admin-password" type="password" placeholder="Password" />
    <button id="admin-login-btn" class="btn-in" type="button">Log in</button>
    <button id="admin-reset-password-btn" class="admin-btn secondary" type="button">Reset admin password</button>
    <div id="admin-message" class="admin-message"></div>
</div>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxw2NO8BwcVYdiHyZfzVFFkY_D8VTaBBuMayNcRWopDFAi0PKwiuOKXZxJXVyPZvEP0-w/exec';
const DEVICE_LOCK_KEY = 'attendance_device_lock';
const DEVICE_RESET_CODE = 'lifecard-reset-2026';
const STORAGE_KEYS = {
    pendingQueue: 'attendance_pending_queue',
    recentLog: 'attendance_recent_log',
    lastSynced: 'attendance_last_synced',
    lastAction: 'attendance_last_action'
};

function readStoredJson(key, fallback = []) {
    try {
        const value = localStorage.getItem(key);
        return value ? JSON.parse(value) : fallback;
    } catch (error) {
        return fallback;
    }
}

function injectBackendScript(url) {
    const script = document.createElement('script');
    script.src = url;
    script.async = true;
    script.onload = () => script.remove();
    script.onerror = () => script.remove();
    document.body.appendChild(script);
}

function normalizeBackendResponse(data) {
    if (!data) return { ok: false, message: 'No response from backend.' };
    if (data.result !== undefined) {
        return normalizeBackendResponse(data.result);
    }
    if (typeof data === 'string') {
        return { ok: data.toLowerCase().includes('ok') || data.toLowerCase().includes('allowed'), message: data };
    }
    return {
        ok: data.ok === true || data.allowed === true,
        message: data.message || data.result || 'Backend response received.',
        staff: data.staff || null
    };
}

function authenticateAdmin(username, password, callback) {
    const callbackName = `adminAuth_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    window[callbackName] = (data) => {
        const normalized = normalizeBackendResponse(data);
        callback(normalized);
        delete window[callbackName];
    };
    const params = new URLSearchParams({
        callback: callbackName,
        mode: 'admin-login',
        username,
        password
    });
    injectBackendScript(`${SCRIPT_URL}?${params.toString()}`);
}

function resetAdminPassword(username, newPassword, callback) {
    const callbackName = `adminReset_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    window[callbackName] = (data) => {
        const normalized = normalizeBackendResponse(data);
        callback(normalized);
        delete window[callbackName];
    };
    const params = new URLSearchParams({
        callback: callbackName,
        mode: 'admin-reset-password',
        username,
        newPassword
    });
    injectBackendScript(`${SCRIPT_URL}?${params.toString()}`);
}

function renderStaffList(staff) {
    const staffList = document.getElementById('staff-list');
    if (!staffList) return;
    if (!staff.length) {
        staffList.innerHTML = '<div class="admin-row"><span>No staff yet</span></div>';
        return;
    }
    staffList.innerHTML = staff.map((entry) => `
        <div class="admin-row staff-row">
            <span>${entry.name}</span>
            <div class="staff-actions">
                <button class="admin-btn secondary small" type="button" data-reset-name="${entry.name}">Reset</button>
                <button class="admin-btn secondary small danger" type="button" data-remove-name="${entry.name}">Remove</button>
            </div>
        </div>
    `).join('');

    document.querySelectorAll('[data-reset-name]').forEach((button) => {
        button.addEventListener('click', () => {
            const name = button.getAttribute('data-reset-name');
            resetStaffLock(name);
        });
    });

    document.querySelectorAll('[data-remove-name]').forEach((button) => {
        button.addEventListener('click', () => {
            const name = button.getAttribute('data-remove-name');
            removeStaff(name);
        });
    });
}

function listStaff(callback) {
    const callbackName = `listStaff_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    window[callbackName] = (data) => {
        const normalized = normalizeBackendResponse(data);
        if (normalized.ok && normalized.staff) {
            renderStaffList(normalized.staff);
            if (callback) callback(normalized.staff);
        }
        delete window[callbackName];
    };
    const params = new URLSearchParams({ callback: callbackName, mode: 'list-staff' });
    injectBackendScript(`${SCRIPT_URL}?${params.toString()}`);
}

function addStaff(name) {
    const callbackName = `addStaff_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    window[callbackName] = (data) => {
        const normalized = normalizeBackendResponse(data);
        alert(normalized.message || 'Staff action completed.');
        if (normalized.ok) {
            listStaff();
        }
        delete window[callbackName];
    };
    const params = new URLSearchParams({ callback: callbackName, mode: 'add-staff', name });
    injectBackendScript(`${SCRIPT_URL}?${params.toString()}`);
}

function removeStaff(name) {
    if (!confirm(`Remove ${name} from the staff list?`)) return;
    const callbackName = `removeStaff_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    window[callbackName] = (data) => {
        const normalized = normalizeBackendResponse(data);
        alert(normalized.message || 'Staff removed.');
        if (normalized.ok) {
            listStaff();
        }
        delete window[callbackName];
    };
    const params = new URLSearchParams({ callback: callbackName, mode: 'remove-staff', name });
    injectBackendScript(`${SCRIPT_URL}?${params.toString()}`);
}

function resetStaffLock(name) {
    const callbackName = `resetStaffLock_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    window[callbackName] = (data) => {
        const normalized = normalizeBackendResponse(data);
        alert(normalized.message || 'Staff lock reset.');
        if (normalized.ok) {
            listStaff();
        }
        delete window[callbackName];
    };
    const params = new URLSearchParams({ callback: callbackName, mode: 'reset-staff-lock', name });
    injectBackendScript(`${SCRIPT_URL}?${params.toString()}`);
}

function loadStaffList() {
    listStaff();
}

function renderAdminPanel() {
    const message = document.getElementById('admin-message');
    const owner = localStorage.getItem(DEVICE_LOCK_KEY) || 'Not set';
    const pending = readStoredJson(STORAGE_KEYS.pendingQueue, []).length;
    message.innerHTML = `
        <div class="admin-panel admin-panel-inline">
            <div class="admin-content">
                <div class="admin-row"><span>Device owner</span><strong>${owner}</strong></div>
                <div class="admin-row"><span>Pending sync</span><strong>${pending}</strong></div>
                <div class="staff-manager">
                    <h3>Staff list</h3>
                    <div id="staff-list"></div>
                    <input id="new-staff-name" type="text" placeholder="Add staff name" />
                    <button id="add-staff-btn" class="admin-btn" type="button">Add staff</button>
                    <button id="reset-device-btn" class="admin-btn secondary" type="button">Reset device lock</button>
                    <button id="clear-history-btn" class="admin-btn secondary" type="button">Clear local history</button>
                </div>
            </div>
        </div>
    `;

    loadStaffList();

    document.getElementById('add-staff-btn').addEventListener('click', () => {
        const name = document.getElementById('new-staff-name').value.trim();
        if (!name) return;
        addStaff(name);
    });

    document.getElementById('reset-device-btn').addEventListener('click', () => {
        const enteredCode = prompt('Enter reset code to remove the device lock:');
        if (!enteredCode) return;
        if (enteredCode !== DEVICE_RESET_CODE) {
            alert('Incorrect reset code.');
            return;
        }
        const newOwner = prompt('Enter the staff name to assign to this device after reset:');
        if (!newOwner) return;
        localStorage.setItem(DEVICE_LOCK_KEY, newOwner);
        alert(`Device reassigned to ${newOwner}.`);
        renderAdminPanel();
    });

    document.getElementById('clear-history-btn').addEventListener('click', () => {
        if (!confirm('Clear local history and pending sync items?')) return;
        localStorage.removeItem(STORAGE_KEYS.recentLog);
        localStorage.removeItem(STORAGE_KEYS.pendingQueue);
        localStorage.removeItem(STORAGE_KEYS.lastSynced);
        localStorage.removeItem(STORAGE_KEYS.lastAction);
        alert('Local history cleared.');
        renderAdminPanel();
    });
}

document.getElementById('admin-login-btn').addEventListener('click', () => {
    const username = document.getElementById('admin-username').value.trim();
    const password = document.getElementById('admin-password').value;
    authenticateAdmin(username, password, (response) => {
        if (response.ok) {
            renderAdminPanel();
            document.getElementById('admin-message').style.display = 'block';
        } else {
            document.getElementById('admin-message').innerText = response.message || 'Invalid admin credentials.';
            document.getElementById('admin-message').style.display = 'block';
        }
    });
});

document.getElementById('admin-reset-password-btn').addEventListener('click', () => {
    const username = prompt('Enter the admin username:');
    if (!username) return;
    const newPassword = prompt('Enter a new admin password:');
    if (!newPassword) return;
    resetAdminPassword(username, newPassword, (response) => {
        const messageEl = document.getElementById('admin-message');
        messageEl.innerText = response.message || 'Password reset request completed.';
        messageEl.style.display = 'block';
    });
});
</script>
</body>
</html>
