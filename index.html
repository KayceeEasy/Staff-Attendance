<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json" id="manifest-link">
    <link rel="apple-touch-icon" href="image/png/icon-192.png" id="apple-touch-icon">
    <base target="_top">
    <meta name="theme-color" content="#2563eb">
    <script src="https://unpkg.com/lucide@latest"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>
        // Dynamically set paths based on current location for portability
        const APP_BASE = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
        window.APP_PATHS = {
            sw: APP_BASE + 'sw.js',
            manifest: APP_BASE + 'manifest.json',
            icon192: APP_BASE + 'image/png/icon-192.png',
            icon512: APP_BASE + 'image/png/icon-512.png'
        };
    </script>
<body>
<div class="card">
    <div class="topbar">
        <div class="eyebrow">Staff Attendance</div>
        <div class="topbar-actions">
            <button id="refresh-btn" class="theme-toggle" type="button" aria-label="Refresh app" title="Refresh">Refresh</button>
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch theme">Dark</button>
        </div>
    </div>
    <i data-lucide="map-pin" size="48" color="#2563eb"></i>
    <div id="loc-status" class="status waiting">Verifying GPS...</div>
    <div id="distance-label" class="distance-label"></div>
    <select id="staff-name">
        <option value="">Select your name...</option>
        <option>Uche</option><option>Julianah</option><option>Blessingjoy</option>
        <option>Esther</option><option>Paschaline</option><option>Ikechukwu</option>
        <option>Ayomide</option><option>Deborah</option><option>Elizabeth</option>
        <option>Valentine</option><option>Kenneth</option><option>Martha</option>
    </select>
    <div class="btn-group">
        <button id="in-btn" class="btn-in" disabled>Sign In</button>
        <button id="out-btn" class="btn-out" disabled>Sign Out</button>
    </div>
    <div id="msg"></div>
    <div id="last-action" class="last-action">Last action: none yet</div>
    <div class="log-card">
        <div class="log-head">
            <strong>Recent attendance</strong>
            <span id="last-synced">Last synced: -</span>
        </div>
        <ul id="log-list"></ul>
    </div>
    <a id="admin-access-btn" class="admin-btn admin-link" href="./admin/">Admin access</a>
    <button id="install-btn" style="display:none; background: #eee; color: #333; margin-top: 10px;">
        Install App
    </button>
</div>
<script src="common.js"></script>
<script src="script.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register(window.APP_PATHS.sw)
            .catch(err => console.log('SW registration failed: ', err));
    }
</script>
</body>
</html>
