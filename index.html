<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="icon-192.png">
    <base target="_top">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
<div class="card">
    <i data-lucide="map-pin" size="48" color="#2563eb"></i>
    <h1 style="font-size: 1.5rem;">Staff Attendance</h1>
    <div id="loc-status" class="status waiting">Verifying GPS...</div>
    <select id="staff-name">
        <option value="">Select your name...</option>
        <option>Uche</option><option>Julianah</option><option>Blessingjoy</option>
        <option>Esther</option><option>Paschaline</option><option>Ikechukwu</option>
        <option>Ayomide</option><option>Deborah</option><option>Elizabeth</option>
        <option>Valentine</option><option>Kenneth</option><option>Martha</option>
    </select>
    <div class="btn-group">
        <button id="in-btn" class="btn-in" disabled onclick="submit('IN')">Sign In</button>
        <button id="out-btn" class="btn-out" disabled onclick="submit('OUT')">Sign Out</button>
    </div>
    <div id="msg"></div>
    <button id="install-btn" style="display:none; background: #eee; color: #333; margin-top: 10px;">
        Install App
    </button>
</div>
<script src="script.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
            .catch(err => console.log('SW registration failed: ', err));
    }
</script>
</body>
</html>
