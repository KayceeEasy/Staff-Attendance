<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Office Attendance</title>
    <script src="https://unpkg.com/lucide@0.460.0" integrity="sha384-ieG+IKD0d/ZPXyCBTMVAbqsQdns8QGJR/e26WMw7M4fkaI/rHcS/YIoi+ah9WGge" crossorigin="anonymous"></script>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src https://script.google.com; img-src 'self' data:;">
    <style>
        :root { --primary: #2563eb; --success: #166534; --error: #C00000; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 2.5rem; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 90%; max-width: 400px; text-align: center; }
        .status { padding: 8px 16px; border-radius: 30px; font-size: 0.75rem; font-weight: 700; margin-bottom: 25px; display: inline-flex; align-items: center; gap: 6px; }
        .waiting { background: #fef9c3; color: #854d0e; }
        .ready { background: #dcfce7; color: #166534; }
        select { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 1rem; margin-bottom: 20px; background: white; cursor: pointer; outline: none; -webkit-appearance: none; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 18px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-in { background: var(--primary); color: white; }
        .btn-out { background: #0f172a; color: white; }
        button:disabled { opacity: 0.2; }
        #msg { margin-top: 25px; padding: 12px; border-radius: 10px; font-size: 1rem; font-weight: 800; display: none; line-height: 1.4; border: 2px solid transparent; }
        .msg-late { background: #fee2e2; color: var(--error); border-color: #fca5a5 !important; }
        .msg-welcome { background: #dcfce7; color: var(--success); border-color: #86efac !important; }
        .spin { animation: rotate 2s infinite linear; }
        @keyframes rotate { from {transform:rotate(0deg);} to {transform:rotate(360deg);} }
    </style>
</head>
<body>

<div class="card">
    <i data-lucide="map-pin" size="48" color="#2563eb"></i>
    <h1 style="font-size: 1.5rem; margin: 1rem 0;">Staff Attendance</h1>
    <div id="loc-status" class="status waiting"><i data-lucide="loader" class="spin" size="14"></i> Verifying Location...</div>

    <select id="staff-name">
        <option value="">Select your name...</option>
        <option>Uche</option><option>Julianah</option><option>Blessingjoy</option>
        <option>Esther</option><option>Paschaline</option><option>Ikechukwu</option>
        <option>Ayomide</option><option>Deborah</option><option>Elizabeth</option>
        <option>Valentine</option><option>Kenneth</option><option>Martha</option>
    </select>

    <div class="btn-group">
        <button id="in-btn" class="btn-in" disabled onclick="submit('IN')"><i data-lucide="user-check"></i> Sign In</button>
        <button id="out-btn" class="btn-out" disabled onclick="submit('OUT')"><i data-lucide="log-out"></i> Sign Out</button>
    </div>
    <div id="msg"></div>

</div>

<script>
    // Backend endpoint — restrict access on the Apps Script side (e.g. allowlisted origins/referrers)
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbyrj257cGtkowcqYvptTd7zchkoBtAnyDGAEpRUqCFxYn5hO21uz9EDZXn__YMTMGAqKA/exec";
    
    const VALID_STAFF = ['Uche','Julianah','Blessingjoy','Esther','Paschaline','Ikechukwu','Ayomide','Deborah','Elizabeth','Valentine','Kenneth','Martha'];

    function getFingerprint() {
        const sig = [
            navigator.userAgent, screen.width, screen.height,
            navigator.hardwareConcurrency, navigator.language,
            new Date().getTimezoneOffset(),
            screen.colorDepth
        ].join('|');
        let hash = 0;
        for (let i = 0; i < sig.length; i++) {
            hash = ((hash << 5) - hash) + sig.charCodeAt(i);
            hash |= 0;
        }
        return 'fp-' + Math.abs(hash).toString(36);
    }
    const deviceId = getFingerprint();
    let lastSubmitTime = 0;

    let coords = null;
    lucide.createIcons();

    window.onload = () => {
        const savedName = localStorage.getItem('saved_name');
        if (savedName) document.getElementById('staff-name').value = savedName;

        navigator.geolocation.getCurrentPosition((pos) => {
            coords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            const locStatus = document.getElementById('loc-status');
            locStatus.textContent = '\u2713 Location Ready';
            locStatus.className = "status ready";
            document.getElementById('in-btn').disabled = false;
            document.getElementById('out-btn').disabled = false;
        }, (err) => {
            document.getElementById('loc-status').textContent = "GPS REQUIRED";
            document.getElementById('loc-status').style.background = "#fee2e2";
        }, { enableHighAccuracy: true });
    };

    async function submit(action) {
        const now = Date.now();
        if (now - lastSubmitTime < 10000) return alert('Please wait before submitting again.');

        const name = document.getElementById('staff-name').value;
        const msg = document.getElementById('msg');
        if (!name) return alert("Select your name");
        if (!VALID_STAFF.includes(name)) return alert('Invalid staff selection.');
        if (action !== 'IN' && action !== 'OUT') return;
        if (!coords || typeof coords.lat !== 'number' || typeof coords.lon !== 'number') return alert('Location not available.');

        lastSubmitTime = now;

        document.getElementById('in-btn').disabled = true;
        document.getElementById('out-btn').disabled = true;
        msg.style.display = "block"; msg.textContent = "Syncing...";
        msg.className = ""; msg.style.background = "#f1f5f9"; msg.style.color = "#475569";

        const payload = JSON.stringify({ name, deviceId, action, lat: coords.lat, lon: coords.lon });

        try {
            // FIX: We send as text/plain to avoid CORS pre-flight OPTIONS check
            const response = await fetch(CLOUD_URL, {
                method: "POST",
                mode: "no-cors", // Use no-cors to bypass preflight
                body: payload
            });

            // Since we use no-cors, we can't see the response text directly.
            // We assume success if no error is thrown, then check the sheet.
            msg.className = "msg-welcome";
            msg.textContent = "Success! Log sent to cloud.";
            localStorage.setItem('saved_name', name);
            
        } catch (e) { 
            msg.textContent = "Connection Error";
            msg.style.background = "#fee2e2";
            msg.style.color = "#991b1b";
        } finally {
            document.getElementById('in-btn').disabled = false;
            document.getElementById('out-btn').disabled = false;
        }
    }
</script>
</body>
</html>
